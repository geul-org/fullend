apiVersion: fullend/v1
kind: Project

metadata:
  name: zenflow

backend:
  lang: go
  framework: gin
  module: github.com/zenflow/api
  middleware:
    - bearerAuth
  auth:
    secret_env: JWT_SECRET
    claims:
      ID: user_id
      Email: email
      Role: role

frontend:
  lang: typescript
  framework: react
  bundler: vite
  name: zenflow-web

deploy:
  image: ghcr.io/zenflow/api
  domain: zenflow.example.com
