openapi: 3.0.3
info:
  title: ZenFlow API
  version: 1.0.0
  description: Enterprise Multi-tenant Workflow Automation SaaS

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Organization:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        plan_type:
          type: string
        credits_balance:
          type: integer

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string

    Workflow:
      type: object
      properties:
        id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        title:
          type: string
        trigger_event:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    Action:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        action_type:
          type: string
        payload_template:
          type: object
          nullable: true
        sequence_order:
          type: integer

    ExecutionLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        org_id:
          type: integer
          format: int64
        status:
          type: string
        credits_spent:
          type: integer
        executed_at:
          type: string
          format: date-time

paths:
  /organizations:
    post:
      operationId: CreateOrganization
      summary: Create a new organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, plan_type, credits_balance]
              properties:
                name:
                  type: string
                plan_type:
                  type: string
                credits_balance:
                  type: integer
      responses:
        '200':
          description: Organization created
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: '#/components/schemas/Organization'

  /auth/register:
    post:
      operationId: Register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, email, password, role]
              properties:
                org_id:
                  type: integer
                  format: int64
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

  /auth/login:
    post:
      operationId: Login
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  AccessToken:
                    type: string

  /workflows:
    get:
      operationId: ListWorkflows
      summary: List workflows in user organization
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of workflows
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workflow'

    post:
      operationId: CreateWorkflow
      summary: Create a new workflow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, trigger_event]
              properties:
                title:
                  type: string
                trigger_event:
                  type: string
      responses:
        '200':
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'

  /workflows/{id}:
    get:
      operationId: GetWorkflow
      summary: Get a single workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'

  /workflows/{id}/actions:
    post:
      operationId: CreateAction
      summary: Add an action to a workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_type, sequence_order]
              properties:
                action_type:
                  type: string
                sequence_order:
                  type: integer
      responses:
        '200':
          description: Action created
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    $ref: '#/components/schemas/Action'

  /workflows/{id}/activate:
    put:
      operationId: ActivateWorkflow
      summary: Activate a workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'

  /workflows/{id}/pause:
    put:
      operationId: PauseWorkflow
      summary: Pause a workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'

  /workflows/{id}/archive:
    put:
      operationId: ArchiveWorkflow
      summary: Archive a workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow:
                    $ref: '#/components/schemas/Workflow'

  /workflows/{id}/execute:
    post:
      operationId: ExecuteWorkflow
      summary: Execute a workflow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Workflow executed
          content:
            application/json:
              schema:
                type: object
                properties:
                  log:
                    $ref: '#/components/schemas/ExecutionLog'
