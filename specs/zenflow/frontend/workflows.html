<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZenFlow - Workflows</title>
</head>
<body>
  <section data-fetch="ListWorkflows">
    <div data-state="ListWorkflows.loading">Loading...</div>
    <div data-state="ListWorkflows.empty">No workflows found.</div>
    <ul data-each="workflows">
      <li>
        <h3 data-bind="title"></h3>
        <span data-bind="trigger_event"></span>
        <span data-bind="status"></span>
        <span data-bind="created_at"></span>
        <a data-param-id="route.id" href="/workflow-detail">View</a>
      </li>
    </ul>
  </section>
</body>
</html>
