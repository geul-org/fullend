<!DOCTYPE html>
<html lang="en">
<head><title>ZenFlow Login</title></head>
<body>
  <form data-action="Login">
    <input data-field="email" type="email" placeholder="Email" />
    <input data-field="password" type="password" placeholder="Password" />
    <button type="submit">Login</button>
  </form>
  <form data-action="Register">
    <input data-field="org_name" type="text" placeholder="Organization Name" />
    <input data-field="email" type="email" placeholder="Email" />
    <input data-field="password" type="password" placeholder="Password" />
    <button type="submit">Register</button>
  </form>
</body>
</html>
